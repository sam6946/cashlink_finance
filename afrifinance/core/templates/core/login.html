{% extends 'base.html' %}
{% block title %}Connexion Administrateur — AfriFinance{% endblock %}

{% block content %}
<section class="af-form-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <div class="af-form-icon-wrap mb-3" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">
            <i class="bi bi-shield-lock-fill" style="color:#f0c040;"></i>
          </div>
          <h3 class="fw-bold">Espace Administrateur</h3>
          <p class="text-muted small">Accès réservé aux superutilisateurs</p>
        </div>

        <div class="af-form-card">
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-danger py-2 small">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ msg }}
              </div>
            {% endfor %}
          {% endif %}

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label af-label">Identifiant</label>
              <div class="af-input-wrap">
                <span class="af-input-icon"><i class="bi bi-person-badge-fill"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required autofocus>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label af-label">Mot de passe</label>
              <div class="af-input-wrap">
                <span class="af-input-icon"><i class="bi bi-key-fill"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
              </div>
            </div>
            <button type="submit" class="btn af-btn-primary w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
